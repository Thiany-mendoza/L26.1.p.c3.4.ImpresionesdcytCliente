<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Impresiones DCyT: Admin</title>
  <link rel="stylesheet" href="./src/index.css" />
</head>

<body>
  <div class="pc-viewport">

    <div class="app-content">
      <!-- PANEL 1: Menú Principal -->
      <div id="panelMenu">
        <h1 style="font-size: 26px; border-bottom: none; margin-bottom: 25px;">APP Reproducción</h1>
        <div class="menu-btn-container">
          <button id="menu_btServicios" class="retro-btn retro-btn-large">[Servicios]</button>
          <button id="menu_btPedidos" class="retro-btn retro-btn-large">[Pedidos]</button>
          <button id="menu_btTasaBcv" class="retro-btn retro-btn-large">[Tasa BCV]</button>
        </div>
        <div style="text-align: center; margin-top: 25px; font-weight: bold; font-size: 16px;">
          Tasa BCV actual: <span id="menu_txtTasaBcv">30.00</span> Bs/$
        </div>
      </div>

      <!-- PANEL 2: Gestión de Servicios -->
      <div id="panelServicios" hidden>
        <h1>Gestión de Servicios - Centro de Reproducción Campus Central</h1>
        
        <div class="panel-columns asymmetric" style="margin-top: 10px;">
          <!-- Columna Izquierda: Formulario y Acciones -->
          <div>
            <div class="section-panel">
              <div class="form-group">
                <label for="servicios_inCodigo">Código:</label>
                <input type="text" id="servicios_inCodigo" placeholder="Ej: R01" />
              </div>
              <div class="form-group">
                <label for="servicios_inNombre">Servicio/Producto:</label>
                <input type="text" id="servicios_inNombre" placeholder="Ej: Fotocopia B/N" />
              </div>
              <div class="form-group">
                <label for="servicios_inPrecio">Precio ($):</label>
                <input type="number" step="0.01" id="servicios_inPrecio" placeholder="Ej: 0.12" />
              </div>
              <div class="btn-row">
                <button id="servicios_btAgregar" class="retro-btn">[Agregar]</button>
                <button id="servicios_btEliminar" class="retro-btn">[Eliminar]</button>
                <button id="servicios_btBuscar" class="retro-btn">[Buscar]</button>
              </div>
            </div>
            <button id="servicios_btVolver" class="retro-btn retro-btn-large" style="margin-top: 20px;">[Volver]</button>
          </div>

          <!-- Columna Derecha: Tabla de Registros -->
          <div>
            <h2 style="text-align: center;">Servicios Disponibles</h2>
            <div style="text-align: center; margin-bottom: 10px; font-weight: bold;">
              Cantidad de servicios: <span id="servicios_txtCantidad">0</span>
            </div>
            <table>
              <thead>
                <tr>
                  <th>Código</th>
                  <th>Nombre</th>
                  <th>Precio ($)</th>
                </tr>
              </thead>
              <tbody id="servicios_tblRegistros">
                <!-- Cargado dinámicamente -->
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- PANEL 3: Gestión de Pedidos -->
      <div id="panelPedidos" hidden>
        <h1>APP Reproducción - Gestión de Pedidos - Centro de Copiado</h1>

        <div class="panel-columns asymmetric" style="margin-top: 10px;">
          <!-- Columna Izquierda: Formulario -->
          <div>
            <div class="section-panel">
              <div class="form-group">
                <label for="pedidos_inIdPedido">ID Pedido:</label>
                <input type="text" id="pedidos_inIdPedido" placeholder="Ej: R001" />
              </div>
              <div class="btn-row">
                <button id="pedidos_btAceptar" class="retro-btn">[Aceptar]</button>
                <button id="pedidos_btCancelar" class="retro-btn">[Cancelar]</button>
                <button id="pedidos_btProcesar" class="retro-btn">[Procesar]</button>
              </div>
            </div>
            <button id="pedidos_btVolver" class="retro-btn retro-btn-large" style="margin-top: 20px;">[Volver]</button>
          </div>

          <!-- Columna Derecha: Listado de registros -->
          <div>
            <h2 style="text-align: center; margin-bottom: 10px;">Pedidos en Cola</h2>
            <ul id="pedidos_lstRegistros" class="item-list" style="border: 1px solid #000; padding: 15px; border-radius: 4px; min-height: 150px; background-color: #fff;">
              <!-- Cargado dinámicamente -->
            </ul>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script type="module">
    import Cl_cPersonal from "./dist/controllers/Cl_cPersonal.js";
    import Cl_vPersonal from "./dist/views/Cl_vPersonal.js";

    const vPersonal = new Cl_vPersonal();
    new Cl_cPersonal({ vista: vPersonal });
  </script>
</body>

</html>
